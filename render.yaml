services:
  - type: web
    name: suburbrank
    runtime: python
    plan: free
    buildCommand: pip install -r app/requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ENVIRONMENT
        value: production
      - key: APP_BASE_URL
        sync: false
