{% extends "base.html" %}
{% block content %}
<section class="section auth-section">
  <div class="container auth-container">
    <div class="card auth-card">
      <span class="eyebrow">Welcome back</span>
      <h1>Log in</h1>
      <p>Use your email account to access the SuburbRank dashboard.</p>

      {% if error %}
      <div class="form-alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="auth-form stack">
        <label>
          <span>Email</span>
          <input type="email" name="email" value="{{ email }}" placeholder="you@example.com" required />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Your password" required />
        </label>
        <button type="submit" class="button auth-submit">Log in</button>
      </form>

      <p class="microcopy">New here? <a href="/signup">Create an account</a>.</p>
    </div>
  </div>
</section>
{% endblock %}
